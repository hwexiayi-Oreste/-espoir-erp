<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Espoir Construction ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
.role-banner{background:linear-gradient(90deg,rgba(245,166,35,.08),transparent);border-left:3px solid var(--amber);border-radius:0 var(--r) var(--r) 0;padding:10px 16px;margin-bottom:16px;font-size:.82rem;color:var(--grey-light);}
.role-banner strong{color:var(--amber);}
</style>
</head>
<body>
<div class="erp-layout">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark"><svg viewBox="0 0 24 24" fill="none" stroke="#0b1220" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20L12 4L22 20"/><path d="M6 20L12 10L18 20"/></svg></div>
      <div><div class="logo-name">ESPOIR ERP</div><div class="logo-sub">Plateforme de gestion</div></div>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar" id="sideAvatar">—</div>
      <div><div class="user-name" id="sideNom">Chargement...</div><div class="user-role" id="sideRole">—</div></div>
    </div>
    <nav class="sidebar-nav" id="sideNav"></nav>
    <div class="sidebar-bottom">
      <button class="sidebar-bottom-btn" onclick="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Déconnexion
      </button>
    </div>
  </aside>

  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title" id="topTitle">Dashboard</div>
      <div class="topbar-bread">ERP · <span id="topBread">Vue générale</span></div>
    </div>
    <div class="topbar-right">
      <button class="mobile-menu-btn" onclick="openMobileMenu()" title="Menu" style="margin-right:4px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <button class="topbar-logout-btn" onclick="mobileLogout()" title="Déconnexion">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
      <button class="topbar-icon-btn" onclick="showToast('info','Notifications','Vous avez '+(window._alertesCount||0)+' alertes non lues.')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        <span class="notif-dot" id="notifDot" style="display:none;"></span>
      </button>
      <div class="topbar-user">
        <div class="user-avatar" id="topAvatar">—</div>
        <div><div class="user-name" id="topNom">—</div><div class="user-role" id="topRole">—</div></div>
      </div>
    </div>
  </div>

  <main class="erp-main" id="mainContent">
    <div class="loading-state"><div class="spinner"></div><p>Chargement du tableau de bord...</p></div>
  </main>
</div>
<div id="toast-container"></div>

<script>
// ============================================================
// PERMISSIONS
// ============================================================
const PERMS = {
  admin:     { label:'Administrateur',    kpis:['pipeline','devis','chantiers','clients'], nav:['commercial','operations','finance','admin'],   createDevis:true,  seeChantiers:true, seeTransport:true, seeCompta:true, seeUsers:true,  banner:null },
  directeur: { label:'Directeur Général', kpis:['pipeline','devis','chantiers','clients'], nav:['commercial','operations','finance'],            createDevis:true,  seeChantiers:true, seeTransport:true, seeCompta:true, seeUsers:false, banner:null },
  comptable: { label:'Comptable',         kpis:['pipeline','devis'],                        nav:['commercial_ro','finance'],                     createDevis:false, seeChantiers:false,seeTransport:false,seeCompta:true, seeUsers:false, banner:'Accès <strong>Comptabilité</strong> et <strong>Devis (lecture)</strong>.' },
  technicien:{ label:'Technicien',        kpis:['chantiers','clients'],                     nav:['operations'],                                  createDevis:false, seeChantiers:true, seeTransport:true, seeCompta:false,seeUsers:false, banner:'Accès <strong>Chantiers</strong> et <strong>Transport</strong>.' },
};

function buildSidebar(role) {
  const p = PERMS[role] || PERMS.admin;
  const n = p.nav;
  let h = `
    <p class="nav-section">Principal</p>
    <button class="nav-item active" onclick="window.location.reload()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard
    </button>`;

  if (n.includes('commercial')) {
    h += `
      <p class="nav-section">Commercial</p>
      <button class="nav-item" onclick="location.href='/devis'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Devis &amp; Offres<span class="nav-badge amber" id="navBadgeDevis" style="display:none;">0</span>
      </button>
      <button class="nav-item" onclick="location.href='/clients'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Clients
      </button>`;
  }
  if (n.includes('commercial_ro')) {
    h += `
      <p class="nav-section">Commercial</p>
      <button class="nav-item" onclick="location.href='/devis'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Devis &amp; Offres<span style="margin-left:auto;font-size:.58rem;color:var(--grey-mid);font-family:var(--font-c);font-weight:700;letter-spacing:.08em;">LECTURE</span>
      </button>`;
  }
  if (n.includes('operations')) {
    h += `<p class="nav-section">Opérations</p>`;
    if (p.seeChantiers) h += `
      <button class="nav-item" onclick="location.href='/chantiers'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
        Chantiers<span class="nav-badge red" id="navBadgeChantiers" style="display:none;">0</span>
      </button>`;
    if (p.seeTransport) h += `
      <button class="nav-item" onclick="location.href='/transport'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>Transport &amp; Manutention
      </button>`;
  }
  if (n.includes('finance') && p.seeCompta) {
    h += `
      <p class="nav-section">Finance</p>
      <button class="nav-item" onclick="location.href='/comptabilite'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Comptabilité
      </button>`;
  }
  if (n.includes('admin') && p.seeUsers) {
    h += `
      <p class="nav-section">Administration</p>
      <button class="nav-item" onclick="location.href='/utilisateurs'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>Utilisateurs
      </button>`;
  }
  document.getElementById('sideNav').innerHTML = h;
}

// ============================================================
// HELPERS
// ============================================================
const $ = id => document.getElementById(id);
function fmt(n){if(!n&&n!==0)return'—';if(n>=1e9)return(n/1e9).toFixed(1)+' Md';if(n>=1e6)return(n/1e6).toFixed(1)+'M';return n.toLocaleString('fr-FR');}
function ago(s){if(!s)return'—';const d=new Date(s.replace(' ','T'));const x=(Date.now()-d)/1000;if(x<60)return'À l\'instant';if(x<3600)return'Il y a '+Math.floor(x/60)+' min';if(x<86400)return'Il y a '+Math.floor(x/3600)+'h';return'Il y a '+Math.floor(x/86400)+' j';}
function bdv(s){const m={brouillon:'badge-grey',en_attente:'badge-amber',envoye:'badge-blue',expire_bientot:'badge-red',accepte:'badge-green',refuse:'badge-red',expire:'badge-grey'};const l={brouillon:'Brouillon',en_attente:'En attente',envoye:'Envoyé',expire_bientot:'Expire bientôt',accepte:'Accepté',refuse:'Refusé',expire:'Expiré'};return`<span class="badge ${m[s]||'badge-grey'}">${l[s]||s}</span>`;}
function bch(s){const m={en_cours:'badge-green',retard:'badge-red',planifie:'badge-blue',livre:'badge-grey'};const l={en_cours:'En cours',retard:'Retard',planifie:'Planifié',livre:'Livré'};return`<span class="badge ${m[s]||'badge-grey'}">${l[s]||s}</span>`;}
function pc(p){if(p>=80)return'green';if(p>=40)return'amber';return'blue';}
function rl(r){return{admin:'Administrateur',directeur:'Directeur Général',comptable:'Comptable',technicien:'Technicien',client:'Client'}[r]||r;}
function ini(a,b){return((a||'')[0]||(b||'')[0]||'?').toUpperCase()+((b||'')[0]||(a||'')[1]||'?').toUpperCase();}
function aicon(t){const m={danger:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',warning:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>',success:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',info:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'};return m[t]||m.info;}

function showToast(type,title,msg){
  const i={success:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',error:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/></svg>',warning:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>',info:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/></svg>'};
  const t=document.createElement('div');t.className=`toast ${type}`;
  t.innerHTML=`<div class="toast-icon">${i[type]||i.info}</div><div class="toast-text"><strong>${title}</strong><p>${msg}</p></div>`;
  $('toast-container').appendChild(t);
  setTimeout(()=>{t.classList.add('removing');setTimeout(()=>t.remove(),300);},3500);
}

// ============================================================
// AUTH
// ============================================================
let currentUser=null;

async function checkAuth(){
  const res=await fetch('/api/auth/me');
  const data=await res.json();
  if(!data.ok){window.location.href='/login';return;}
  currentUser=data.user;
  if(currentUser.role==='client'){window.location.href='/espace-client';return;}
  const av=ini(currentUser.prenom,currentUser.nom);
  const nm=currentUser.prenom+' '+currentUser.nom;
  const label=rl(currentUser.role);
  $('sideAvatar').textContent=av; $('sideNom').textContent=nm; $('sideRole').textContent=label;
  $('topAvatar').textContent=av;  $('topNom').textContent=nm;  $('topRole').textContent=label;
  buildSidebar(currentUser.role);
}

async function logout(){await fetch('/api/auth/logout',{method:'POST'});window.location.href='/login';}

// ============================================================
// RENDER DASHBOARD
// ============================================================
window._alertesCount=0;

async function renderDashboard(){
  const res=await fetch('/api/dashboard');
  if(res.status===401){window.location.href='/login';return;}
  const data=await res.json();
  if(!data.ok){showToast('error','Erreur','Impossible de charger les données.');return;}

  const {kpis,derniers_devis,chantiers,alertes,activite}=data;
  const p=PERMS[currentUser.role]||PERMS.admin;

  window._alertesCount=alertes.filter(a=>!a.lu).length;
  if(window._alertesCount>0) $('notifDot').style.display='';

  // Badges nav
  const bd=document.getElementById('navBadgeDevis');
  if(bd&&kpis.devis_en_attente>0){bd.textContent=kpis.devis_en_attente;bd.style.display='';}
  const bc=document.getElementById('navBadgeChantiers');
  if(bc&&kpis.chantiers_retard>0){bc.textContent=kpis.chantiers_retard;bc.style.display='';}

  // KPIs
  const KPIS={
    pipeline:`<div class="kpi-card"><div class="kpi-top"><div class="kpi-icon amber"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div><span class="kpi-badge up">↑ Actif</span></div><div class="kpi-value">${fmt(kpis.pipeline_total)} FCFA</div><div class="kpi-label">Pipeline Commercial FCFA</div><div class="kpi-sub">CA accepté : ${fmt(kpis.ca_accepte)}M</div></div>`,
    devis:`<div class="kpi-card"><div class="kpi-top"><div class="kpi-icon blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><span class="kpi-badge ${kpis.devis_expire_bientot>0?'down':'up'}">${kpis.devis_expire_bientot} urgent${kpis.devis_expire_bientot>1?'s':''}</span></div><div class="kpi-value">${kpis.devis_en_attente}</div><div class="kpi-label">Devis en Attente</div><div class="kpi-sub">${kpis.devis_expire_bientot} expirant bientôt</div></div>`,
    chantiers:`<div class="kpi-card"><div class="kpi-top"><div class="kpi-icon green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></div><span class="kpi-badge ${kpis.chantiers_retard>0?'down':'up'}">${kpis.chantiers_retard} retard${kpis.chantiers_retard>1?'s':''}</span></div><div class="kpi-value">${kpis.chantiers_actifs}</div><div class="kpi-label">Chantiers Actifs</div><div class="kpi-sub">${kpis.chantiers_actifs-kpis.chantiers_retard} dans les délais</div></div>`,
    clients:`<div class="kpi-card"><div class="kpi-top"><div class="kpi-icon orange"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><span class="kpi-badge up">${kpis.prospects} prospects</span></div><div class="kpi-value">${kpis.clients_actifs}</div><div class="kpi-label">Clients Actifs</div><div class="kpi-sub">${kpis.prospects} prospects en cours</div></div>`,
  };
  const kpiHtml=p.kpis.map(k=>KPIS[k]||'').join('');

  // Bouton action
  let actionBtn='';
  if(p.createDevis) actionBtn=`<button class="btn btn-amber" onclick="location.href='/devis'" style="display:flex;align-items:center;gap:7px;font-family:var(--font-c);font-size:.78rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:10px 20px;border-radius:var(--r);border:none;cursor:pointer;background:var(--amber);color:var(--navy);"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nouveau Devis</button>`;
  else if(p.seeCompta) actionBtn=`<button class="btn btn-amber" onclick="location.href='/comptabilite'" style="display:flex;align-items:center;gap:7px;font-family:var(--font-c);font-size:.78rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:10px 20px;border-radius:var(--r);border:none;cursor:pointer;background:var(--amber);color:var(--navy);"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Comptabilité</button>`;
  else if(p.seeChantiers) actionBtn=`<button class="btn btn-amber" onclick="location.href='/chantiers'" style="display:flex;align-items:center;gap:7px;font-family:var(--font-c);font-size:.78rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:10px 20px;border-radius:var(--r);border:none;cursor:pointer;background:var(--amber);color:var(--navy);"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><polygon points="12 2 2 7 12 12 22 7 12 2"/></svg>Mes Chantiers</button>`;

  // Bannière
  const bannerHtml=p.banner?`<div class="role-banner">👤 ${p.banner}</div>`:'';

  // Section chantiers
  const secChantiers=p.seeChantiers?`<div class="card"><div class="card-header"><div class="card-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>Chantiers Actifs</div><button class="btn btn-sm btn-ghost" style="font-size:.66rem;padding:5px 10px;" onclick="location.href='/chantiers'">Voir tout →</button></div><div class="card-body" style="padding-top:4px;">${chantiers.length?chantiers.slice(0,5).map(c=>`<div class="chantier-mini"><div class="chantier-mini-top"><div><div class="chantier-mini-name">${c.nom}</div><div class="chantier-mini-sub">${c.type_service} · ${c.lieu}</div></div>${bch(c.statut)}</div><div class="progress-label"><span>Avancement</span><span>${c.avancement}%</span></div><div class="progress-bar"><div class="progress-fill ${c.statut==='retard'?'red':pc(c.avancement)}" style="width:${c.avancement}%"></div></div></div>`).join(''):'<p style="color:var(--grey-mid);font-size:.84rem;padding:12px 0;">Aucun chantier actif.</p>'}</div></div>`:'';

  // Section devis
  const hasDev=p.nav.includes('commercial')||p.nav.includes('commercial_ro');
  const secDevis=hasDev?`<div class="card"><div class="card-header"><div class="card-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Derniers Devis</div><button class="btn btn-sm btn-ghost" style="font-size:.66rem;padding:5px 10px;" onclick="location.href='/devis'">Voir tout →</button></div><div class="table-wrap"><table><thead><tr><th>Référence</th><th>Client</th><th>Montant HT</th><th>Statut</th></tr></thead><tbody>${derniers_devis.map(d=>`<tr><td><strong>${d.reference}</strong></td><td>${d.client_nom||'—'}</td><td>${fmt(d.montant_ht)} FCFA</td><td>${bdv(d.statut)}</td></tr>`).join('')}</tbody></table></div></div>`:'';

  // Accès rapide technicien
  const secTech=currentUser.role==='technicien'?`<div class="card"><div class="card-header"><div class="card-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/></svg>Accès Rapide</div></div><div class="card-body" style="display:flex;gap:10px;flex-wrap:wrap;padding:16px;"><button class="btn btn-sm btn-ghost" onclick="location.href='/chantiers'" style="flex:1;min-width:140px;padding:14px;display:flex;flex-direction:column;align-items:center;gap:6px;height:auto;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:22px;height:22px;color:var(--amber);"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg><span>Chantiers</span></button><button class="btn btn-sm btn-ghost" onclick="location.href='/transport'" style="flex:1;min-width:140px;padding:14px;display:flex;flex-direction:column;align-items:center;gap:6px;height:auto;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:22px;height:22px;color:var(--amber);"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/></svg><span>Transport</span></button></div></div>`:'';

  // Accès rapide comptable
  const secCompta=currentUser.role==='comptable'?`<div class="card"><div class="card-header"><div class="card-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Accès Rapide</div></div><div class="card-body" style="display:flex;gap:10px;flex-wrap:wrap;padding:16px;"><button class="btn btn-sm btn-ghost" onclick="location.href='/comptabilite'" style="flex:1;min-width:140px;padding:14px;display:flex;flex-direction:column;align-items:center;gap:6px;height:auto;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:22px;height:22px;color:var(--amber);"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg><span>Comptabilité</span></button><button class="btn btn-sm btn-ghost" onclick="location.href='/devis'" style="flex:1;min-width:140px;padding:14px;display:flex;flex-direction:column;align-items:center;gap:6px;height:auto;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:22px;height:22px;color:var(--amber);"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/></svg><span>Devis (lecture)</span></button></div></div>`:'';

  // Mise en page bas
  let bottomHtml='';
  if(currentUser.role==='technicien') bottomHtml=`<div class="grid-2">${secChantiers}${secTech}</div>`;
  else if(currentUser.role==='comptable') bottomHtml=`<div class="grid-2">${secDevis}${secCompta}</div>`;
  else bottomHtml=`<div class="grid-2">${secChantiers}${secDevis}</div>`;

  $('mainContent').innerHTML=`
    <div class="page-header">
      <div><h2>Tableau de Bord</h2><p id="dashDate" style="font-size:.8rem;color:var(--grey-mid);margin-top:2px;"></p></div>
      <div class="page-actions">
        <button class="btn btn-sm btn-ghost" onclick="renderDashboard()" style="display:flex;align-items:center;gap:6px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px;"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>Actualiser
        </button>
        ${actionBtn}
      </div>
    </div>

    ${bannerHtml}
    <div class="kpi-grid" style="margin-bottom:16px;">${kpiHtml}</div>

    <div class="grid-2" style="margin-bottom:16px;">
      <div class="card">
        <div class="card-header">
          <div class="card-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>Alertes &amp; Notifications</div>
          <span class="badge badge-red">${window._alertesCount} nouvelle${window._alertesCount>1?'s':''}</span>
        </div>
        <div class="card-body" style="padding-top:6px;"><div class="alert-list">
          ${alertes.length?alertes.map(a=>`<div class="alert-item ${a.lu?'lu':''}" onclick="markAlertRead(${a.id},this)"><div class="alert-ic ${a.type}">${aicon(a.type)}</div><div style="flex:1;"><div class="alert-title">${a.titre}</div><div class="alert-msg">${a.message||''}</div></div><span class="alert-time">${ago(a.created_at)}</span></div>`).join(''):'<p style="color:var(--grey-mid);font-size:.84rem;padding:8px 0;">Aucune alerte.</p>'}
        </div></div>
      </div>
      <div class="card">
        <div class="card-header">
          <div class="card-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Activité Récente</div>
          <span style="font-size:.74rem;color:var(--grey-mid);">Dernières actions</span>
        </div>
        <div class="card-body" style="padding-top:8px;"><div class="timeline">
          ${activite.map((a,i)=>`<div class="tl-item"><div class="tl-left"><div class="tl-dot ${['green','amber','blue','amber','green','blue'][i%6]}"></div>${i<activite.length-1?'<div class="tl-line"></div>':''}</div><div class="tl-body"><div class="tl-action">${a.action}</div><div class="tl-detail">${a.detail||''}</div>${a.user_nom?`<div class="tl-detail" style="color:var(--amber);margin-top:2px;font-size:.72rem;">${a.user_nom}</div>`:''}</div><div class="tl-time">${ago(a.created_at)}</div></div>`).join('')}
        </div></div>
      </div>
    </div>

    ${bottomHtml}
  `;

  const now=new Date();
  $('dashDate')&&($('dashDate').textContent=now.toLocaleDateString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric'})+' · Données en temps réel');
}

async function markAlertRead(id,el){el.classList.add('lu');await fetch(`/api/dashboard/alerte/${id}/lue`,{method:'PATCH'});}

(async()=>{
  await checkAuth();
  if(currentUser&&currentUser.role!=='client') await renderDashboard();
})();
</script>

<!-- ===== MENU MOBILE ===== -->
<div class="mobile-overlay" id="mobileOverlay" onclick="closeMobileMenu()"></div>
<div class="mobile-drawer" id="mobileDrawer">
  <div class="mobile-drawer-header">
    <div class="mobile-drawer-logo">
      <div class="logo-mark" style="width:34px;height:34px;background:var(--amber);display:flex;align-items:center;justify-content:center;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0b1220" stroke-width="2.5" style="width:16px;height:16px;"><path d="M2 20L12 4L22 20"/><path d="M6 20L12 10L18 20"/></svg>
      </div>
      <div><div class="logo-name" style="font-family:var(--font-d);font-size:.9rem;letter-spacing:.05em;color:var(--white);">ESPOIR ERP</div></div>
    </div>
    <button onclick="closeMobileMenu()" style="background:none;border:none;color:var(--grey-mid);cursor:pointer;font-size:1.2rem;padding:4px;">✕</button>
  </div>
  <div class="mobile-drawer-user">
    <div class="user-avatar" id="drawerAvatar" style="width:34px;height:34px;border-radius:50%;background:var(--amber);display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:.95rem;color:var(--navy);flex-shrink:0;">—</div>
    <div>
      <div id="drawerNom" style="font-size:.84rem;font-weight:600;color:var(--white);">—</div>
      <div id="drawerRole" style="font-family:var(--font-c);font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);">—</div>
    </div>
  </div>
  <nav class="mobile-drawer-nav" id="drawerNav" style="padding:10px;">
    <!-- rempli par JS -->
  </nav>
  <div class="mobile-drawer-bottom">
    <button onclick="mobileLogout()" style="display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:var(--r);font-size:.86rem;color:var(--red);background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.15);width:100%;text-align:left;cursor:pointer;transition:all .2s;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;flex-shrink:0;"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Déconnexion
    </button>
  </div>
</div>

<script>
// ===== MENU MOBILE =====
function openMobileMenu() {
  document.getElementById('mobileOverlay')?.classList.add('open');
  document.getElementById('mobileDrawer')?.classList.add('open');
}
function closeMobileMenu() {
  document.getElementById('mobileOverlay')?.classList.remove('open');
  document.getElementById('mobileDrawer')?.classList.remove('open');
}
async function mobileLogout() {
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.href = '/login';
}
function fillMobileDrawer(user) {
  if (!user) return;
  const av = (user.prenom||'?')[0].toUpperCase() + (user.nom||'?')[0].toUpperCase();
  const rl = {admin:'Administrateur',directeur:'Directeur Général',comptable:'Comptable',technicien:'Technicien',client:'Client'}[user.role] || user.role;
  const el_a = document.getElementById('drawerAvatar');
  const el_n = document.getElementById('drawerNom');
  const el_r = document.getElementById('drawerRole');
  if (el_a) el_a.textContent = av;
  if (el_n) el_n.textContent = user.prenom + ' ' + user.nom;
  if (el_r) el_r.textContent = rl;

  // Construire la nav du drawer selon le rôle
  const p = user.role;
  const links = [
    { href:'/dashboard',    label:'Dashboard',              icon:'<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>',  roles:['admin','directeur','comptable','technicien'] },
    { href:'/devis',        label:'Devis & Offres',         icon:'<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>',  roles:['admin','directeur','comptable'] },
    { href:'/clients',      label:'Clients',                icon:'<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>',  roles:['admin','directeur'] },
    { href:'/chantiers',    label:'Chantiers',              icon:'<polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>',  roles:['admin','directeur','technicien'] },
    { href:'/transport',    label:'Transport & Manutention',icon:'<rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>',  roles:['admin','directeur','technicien'] },
    { href:'/comptabilite', label:'Comptabilité',           icon:'<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>',  roles:['admin','directeur','comptable'] },
    { href:'/utilisateurs', label:'Utilisateurs',           icon:'<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>',  roles:['admin'] },
    // Espace client
    { href:'/espace-client',label:'Mon Espace',             icon:'<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>',  roles:['client'] },
    { href:'/espace-client',label:'Mes Devis',              icon:'<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>',  roles:['client'] },
    { href:'/espace-client',label:'Mes Chantiers',          icon:'<polygon points="12 2 2 7 12 12 22 7 12 2"/>',  roles:['client'] },
    { href:'/espace-client',label:'Mes Factures',           icon:'<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>',  roles:['client'] },
  ];

  const currentPath = window.location.pathname;
  const nav = document.getElementById('drawerNav');
  if (!nav) return;
  nav.innerHTML = links.filter(l => l.roles.includes(p)).map(l => `
    <a href="${l.href}" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r);font-size:.86rem;color:${currentPath===l.href?'var(--amber)':'var(--grey-light)'};background:${currentPath===l.href?'rgba(245,166,35,.08)':'none'};text-decoration:none;margin-bottom:2px;border:1px solid ${currentPath===l.href?'rgba(245,166,35,.15)':'transparent'};">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;flex-shrink:0;">${l.icon}</svg>
      ${l.label}
    </a>
  `).join('');
}
// Hook sur checkAuth global
const _origCheckAuth = typeof checkAuth === 'function' ? checkAuth : null;
document.addEventListener('DOMContentLoaded', () => {
  // On surveille currentUser via interval (chargé de manière async)
  const poll = setInterval(() => {
    if (typeof currentUser !== 'undefined' && currentUser) {
      fillMobileDrawer(currentUser);
      clearInterval(poll);
    }
  }, 100);
  setTimeout(() => clearInterval(poll), 5000);
});
</script>

</body>
</html>
